name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Biome check
        run: yarn check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: next build
        run: yarn build
        env:
          # Dummy values so lib/calculator.ts doesn't throw at build-time
          # (the real API URL/key live in Netlify env for deploys).
          CALCULATOR_API_URL: http://127.0.0.1:3333
          CALCULATOR_API_KEY: ci-test-key

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run tests
        run: yarn test:e2e
        env:
          CI: "true"
          # Matches tests/mock-calculator.ts default; playwright.config.ts
          # wires these into next start via webServer.env.
          CALCULATOR_API_URL: http://127.0.0.1:3333
          CALCULATOR_API_KEY: ci-test-key
      # Only upload artifacts when something fails — on green runs the
      # HTML report is just "20 passed" and traces/videos aren't produced
      # (playwright.config.ts uses retain-on-failure), so there's nothing
      # worth storing.
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  # ────────────────────────────────────────────────────────────────
  # Gate: single required status check for branch protection.
  # Set this as the only required check in branch protection — it
  # transitively enforces lint/build/playwright without needing the
  # required-check list to change when new jobs are added above.
  # ────────────────────────────────────────────────────────────────
  ci-status:
    name: CI Status
    if: always()
    needs: [lint, build, playwright]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          lint_r="${{ needs.lint.result }}"
          build_r="${{ needs.build.result }}"
          e2e_r="${{ needs.playwright.result }}"

          for result in "$lint_r" "$build_r" "$e2e_r"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "❌ A required job failed:"
              echo "   lint=$lint_r build=$build_r e2e=$e2e_r"
              exit 1
            fi
          done

          echo "✅ All required jobs passed or were correctly skipped"
          echo "   lint=$lint_r build=$build_r e2e=$e2e_r"
